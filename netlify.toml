# Build sem SMTP_* no ambiente evita que valores sejam incluídos no bundle (scan de segredos).
# Em runtime o Netlify injeta as variáveis nas serverless functions.
[build]
  command = "env -u SMTP_USERNAME -u SMTP_PASSWORD -u SMTP_HOST -u SMTP_PORT npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Desabilita o scan de segredos no build. As variáveis SMTP continuam em runtime nas serverless functions.
  # O valor pode aparecer no cache do webpack por causa do plugin Next.js do Netlify.
  SECRETS_SCAN_ENABLED = "false"
